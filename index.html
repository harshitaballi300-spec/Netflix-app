<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamClone - Demo Project (Login)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="demo-banner">⚠️ This is a <strong>demo/clone project</strong> built for learning purposes only. Not
        affiliated with Netflix.</div>
    <div class="login-container">
        <header class="login-header">
            <div class="logo-text">STREAM<span style="color:#e50914;">CLONE</span></div>
        </header>

        <main class="login-form-wrapper">
            <h1>Sign In</h1>
            <form id="loginForm">
                <div class="input-container">
                    <input type="email" id="email" placeholder="Email or phone number" required autocomplete="email">
                </div>
                <div class="input-container">
                    <input type="password" id="password" placeholder="Password" required
                        autocomplete="current-password">
                    <i class="fa-solid fa-eye password-toggle" id="togglePassword"></i>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
                <div class="form-help">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">Remember me</label>
                    </div>
                    <a href="#">Need help?</a>
                </div>
                <div class="login-signup-now">
                    New to StreamClone? <a href="register.html">Sign up now</a>.
                </div>
            </form>
        </main>
    </div>

    <script src="script.js" type="module"></script>
</body>

</html>
